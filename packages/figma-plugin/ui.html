<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma Code Link</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        font-size: 12px;
        background: #ffffff;
        color: #1a1a1a;
      }

      button,
      input,
      textarea {
        font-family: inherit;
      }

      .app-root {
        height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .center-screen {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 16px;
        color: #888888;
      }

      .pulse-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      .pulse-dot--danger {
        background: #dc2626;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }

      .app-navbar {
        height: 40px;
        border-bottom: 1px solid #e5e5e5;
        padding: 0 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .navbar__tabs {
        display: flex;
        gap: 4px;
      }

      .navbar__tab {
        border: none;
        background: transparent;
        color: #888888;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
      }

      .navbar__tab:hover {
        background: #f8f8f8;
      }

      .navbar__tab--active {
        background: #f0f0f0;
        color: #1a1a1a;
      }

      .navbar__clear {
        border: none;
        background: transparent;
        font-size: 11px;
        color: #dc2626;
        cursor: pointer;
        padding: 0;
      }

      .content-area {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .queue {
        flex: 1;
        overflow-y: auto;
        padding: 8px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .queue-empty {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #aaaaaa;
        line-height: 1.5;
      }

      .queue-item {
        display: flex;
        gap: 10px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 10px;
      }

      .queue-item__thumbnail {
        width: 60px;
        min-width: 60px;
        aspect-ratio: 1;
        background: #f5f5f5;
        border-radius: 4px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #aaaaaa;
      }

      .queue-item__thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .queue-item__details {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .queue-item__name {
        font-size: 12px;
        font-weight: 600;
        color: #1a1a1a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .queue-item__comment {
        font-size: 11px;
        color: #555555;
        font-style: italic;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .queue-item__actions {
        margin-top: auto;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .queue-item__tag {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 10px;
        text-transform: uppercase;
      }

      .tag--to-build {
        background: #fef3c7;
        color: #92400e;
      }

      .tag--to-fix {
        background: #fee2e2;
        color: #991b1b;
      }

      .tag--review {
        background: #e0e7ff;
        color: #3730a3;
      }

      .tag--completed {
        background: #d1fae5;
        color: #065f46;
      }

      .queue-item__btn {
        border: none;
        background: transparent;
        font-size: 10px;
        cursor: pointer;
        padding: 0;
      }

      .queue-item__btn--delete {
        color: #dc2626;
      }

      .queue-item__btn--copy {
        color: #888888;
      }

      .toolbar {
        height: 48px;
        border-top: 1px solid #e5e5e5;
        padding: 0 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .btn {
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .btn-primary {
        background: #7c6df0;
        color: #ffffff;
      }

      .btn-primary:hover:not(:disabled) {
        background: #6b5ce0;
      }

      .btn-secondary {
        background: #f0f0f0;
        color: #333333;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 100;
      }

      .modal {
        position: fixed;
        inset: 10px;
        background: #ffffff;
        border-radius: 12px;
        z-index: 101;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .modal__header {
        padding: 16px;
        border-bottom: 1px solid #e5e5e5;
      }

      .modal__title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .modal__subtitle {
        font-size: 11px;
        color: #888888;
      }

      .modal__body {
        flex: 1;
        overflow: auto;
        padding: 16px;
      }

      .modal__footer {
        padding: 16px;
        border-top: 1px solid #e5e5e5;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .modal__center {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #888888;
      }

      .selection-card {
        margin-top: 14px;
        padding: 10px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        width: 100%;
      }

      .selection-card__name {
        font-weight: 600;
        margin-bottom: 4px;
      }

      .selection-card__id {
        font-family: "Menlo", "Monaco", monospace;
        font-size: 11px;
        color: #888888;
        word-break: break-all;
      }

      .preview-row {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }

      .preview-details {
        min-width: 0;
      }

      .preview-details__name {
        font-weight: 600;
        margin-bottom: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .preview-details__id {
        font-family: "Menlo", "Monaco", monospace;
        font-size: 11px;
        color: #888888;
        word-break: break-all;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }

      .field label {
        font-size: 11px;
        font-weight: 600;
        color: #555555;
      }

      .field input,
      .field textarea {
        width: 100%;
        font-size: 12px;
        border: 1px solid #e5e5e5;
        border-radius: 6px;
        padding: 8px;
        outline: none;
      }

      .field textarea {
        min-height: 72px;
        resize: vertical;
      }

      .review-placeholder {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #aaaaaa;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const API_BASE = "http://localhost:7842";
      const HEALTH_INTERVAL = 3000;
      const SELECTION_INTERVAL = 500;

      const state = {
        currentView: "server",
        entries: [],
        thumbnails: {},
        healthTimer: null,
        selectionTimer: null,
        modal: null,
      };

      function escHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function postToSandbox(payload) {
        parent.postMessage({ pluginMessage: payload }, "*");
      }

      function getTagClass(status) {
        if (status === "to-fix") return "tag--to-fix";
        if (status === "review") return "tag--review";
        if (status === "completed") return "tag--completed";
        return "tag--to-build";
      }

      function formatEntry(entry) {
        return `- ${entry.figmaNodeName} (${entry.figmaNodeId})\n  Status: ${entry.status}\n  Comment: ${entry.comment || ""}`;
      }

      function formatEntryJson(nodeId, nodeName, comment) {
        return JSON.stringify(
          {
            figmaNodeId: nodeId,
            figmaNodeName: nodeName,
            comment: comment || "",
            status: "to-build",
          },
          null,
          2,
        );
      }

      function serializeEntries(entries) {
        return JSON.stringify(entries || []);
      }

      function captureFocus() {
        const active = document.activeElement;
        if (!active || !active.id) {
          return null;
        }

        if (
          !(active instanceof HTMLInputElement) &&
          !(active instanceof HTMLTextAreaElement)
        ) {
          return null;
        }

        return {
          id: active.id,
          start: active.selectionStart,
          end: active.selectionEnd,
        };
      }

      function restoreFocus(focusState) {
        if (!focusState) {
          return;
        }

        const element = document.getElementById(focusState.id);
        if (
          !element ||
          (!(element instanceof HTMLInputElement) &&
            !(element instanceof HTMLTextAreaElement))
        ) {
          return;
        }

        element.focus();
        if (
          typeof focusState.start === "number" &&
          typeof focusState.end === "number"
        ) {
          element.setSelectionRange(focusState.start, focusState.end);
        }
      }

      async function api(path, options) {
        const response = await fetch(`${API_BASE}${path}`, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });

        if (!response.ok) {
          throw new Error(`Request failed: ${response.status}`);
        }

        if (response.status === 204) {
          return null;
        }

        return response.json();
      }

      function renderServerView() {
        return `
          <div class="center-screen">
            <div><span class="pulse-dot pulse-dot--danger"></span>Waiting for server…</div>
            <div style="margin-top:8px;color:#aaaaaa">Start the figma-link server in your project.</div>
          </div>
        `;
      }

      function renderNavbar() {
        return `
          <div class="app-navbar">
            <div class="navbar__tabs">
              <button class="navbar__tab ${state.currentView === "build" ? "navbar__tab--active" : ""}" data-action="switch-build">Build</button>
              <button class="navbar__tab ${state.currentView === "review" ? "navbar__tab--active" : ""}" data-action="switch-review">Review</button>
            </div>
            ${state.currentView === "build" && state.entries.length > 0 ? '<button class="navbar__clear" data-action="clear-all">Clear All</button>' : ""}
          </div>
        `;
      }

      function renderQueue() {
        if (!state.entries.length) {
          return `
            <div class="queue-empty">
              <div>No queued design tasks.</div>
              <div style="font-size:11px;margin-top:4px;color:#aaaaaa">Click 'Add to Queue' to get started.</div>
            </div>
          `;
        }

        return `<div class="queue">${state.entries
          .map((entry) => {
            const thumb = state.thumbnails[entry.figmaNodeId];
            const thumbMarkup = thumb
              ? `<img src="data:image/png;base64,${thumb}" alt="${escHtml(entry.figmaNodeName)}" />`
              : "<span>—</span>";

            return `
                <div class="queue-item">
                  <div class="queue-item__thumbnail">${thumbMarkup}</div>
                  <div class="queue-item__details">
                    <div class="queue-item__name">${escHtml(entry.figmaNodeName)}</div>
                    ${entry.comment ? `<div class="queue-item__comment">${escHtml(entry.comment)}</div>` : ""}
                    <div class="queue-item__actions">
                      <span class="queue-item__tag ${getTagClass(entry.status)}">${escHtml(entry.status)}</span>
                      <button class="queue-item__btn queue-item__btn--delete" data-action="delete-entry" data-entry-id="${entry.entryId}">Delete</button>
                      <button class="queue-item__btn queue-item__btn--copy" data-action="copy-entry" data-entry-id="${entry.entryId}">Copy</button>
                    </div>
                  </div>
                </div>
              `;
          })
          .join("")}</div>`;
      }

      function renderBuildView() {
        return `
          ${renderNavbar()}
          <div class="content-area">${renderQueue()}</div>
          <div class="toolbar">
            <button class="btn btn-primary" data-action="open-modal">Add to Queue</button>
            <button class="btn btn-secondary" data-action="copy-set" ${state.entries.length === 0 ? "disabled" : ""}>Copy Set</button>
          </div>
        `;
      }

      function renderReviewView() {
        return `
          ${renderNavbar()}
          <div class="content-area">
            <div class="review-placeholder">Review mode — coming soon.</div>
          </div>
        `;
      }

      function renderModal() {
        if (!state.modal) return "";

        if (state.modal.step === "select") {
          const selected = state.modal.selected;
          return `
            <div class="modal-backdrop"></div>
            <div class="modal">
              <div class="modal__header">
                <div class="modal__title">Select New Component</div>
                <div class="modal__subtitle">Select a component on the canvas to create a ticket.</div>
              </div>
              <div class="modal__body">
                <div class="modal__center">
                  ${selected ? "" : '<div><span class="pulse-dot" style="background:#888888"></span>Waiting for selection…</div>'}
                  ${
                    selected
                      ? `<div class="selection-card"><div class="selection-card__name">Selected: ${escHtml(selected.nodeName)}</div><div class="selection-card__id">${escHtml(selected.nodeId)}</div></div>`
                      : ""
                  }
                </div>
              </div>
              <div class="modal__footer">
                <button class="btn btn-secondary" data-action="modal-cancel">Cancel</button>
                <button class="btn btn-primary" data-action="modal-continue" ${selected ? "" : "disabled"}>Continue</button>
              </div>
            </div>
          `;
        }

        const selected = state.modal.selected;
        const thumb =
          state.modal.thumbnail ||
          (selected ? state.thumbnails[selected.nodeId] : null);
        return `
          <div class="modal-backdrop"></div>
          <div class="modal">
            <div class="modal__header">
              <div class="modal__title">Queue Details</div>
              <div class="modal__subtitle">Add metadata before creating the queue item.</div>
            </div>
            <div class="modal__body">
              <div class="preview-row">
                <div class="queue-item__thumbnail">${thumb ? `<img src="data:image/png;base64,${thumb}" alt="thumb" />` : "<span>—</span>"}</div>
                <div class="preview-details">
                  <div class="preview-details__name">${escHtml(selected.nodeName)}</div>
                  <div class="preview-details__id">${escHtml(selected.nodeId)}</div>
                </div>
              </div>
              <div class="field">
                <label for="modal-name">Name</label>
                <input id="modal-name" type="text" value="${escHtml(state.modal.name)}" placeholder="Layer name" />
              </div>
              <div class="field">
                <label for="modal-comment">Comments</label>
                <textarea id="modal-comment" rows="3" placeholder="Describe what needs to be built or fixed…">${escHtml(state.modal.comment || "")}</textarea>
              </div>
            </div>
            <div class="modal__footer">
              <button class="btn btn-secondary" data-action="modal-cancel">Cancel</button>
              <button class="btn btn-secondary" data-action="modal-copy-cancel">Copy & Cancel</button>
              <button class="btn btn-primary" data-action="modal-queue">Queue</button>
            </div>
          </div>
        `;
      }

      function render() {
        const app = document.getElementById("app");
        const focusState = captureFocus();
        let content = "";

        if (state.currentView === "server") {
          content = renderServerView();
        } else if (state.currentView === "review") {
          content = renderReviewView();
        } else {
          content = renderBuildView();
        }

        app.innerHTML = `<div class="app-root">${content}${renderModal()}</div>`;
        bindEvents();
        restoreFocus(focusState);
      }

      function startSelectionPolling() {
        stopSelectionPolling();
        postToSandbox({ type: "POLL_SELECTION" });
        state.selectionTimer = setInterval(() => {
          postToSandbox({ type: "POLL_SELECTION" });
        }, SELECTION_INTERVAL);
      }

      function stopSelectionPolling() {
        if (state.selectionTimer) {
          clearInterval(state.selectionTimer);
          state.selectionTimer = null;
        }
      }

      function requestThumbnails(entries) {
        entries.forEach((entry) => {
          if (state.thumbnails[entry.figmaNodeId] !== undefined) {
            return;
          }
          postToSandbox({
            type: "EXPORT_THUMBNAIL",
            nodeId: entry.figmaNodeId,
          });
        });
      }

      async function refreshTasks() {
        const before = serializeEntries(state.entries);
        const taskFile = await api("/tasks");
        state.entries = Array.isArray(taskFile.entries) ? taskFile.entries : [];
        const after = serializeEntries(state.entries);
        requestThumbnails(state.entries);
        return before !== after;
      }

      async function checkHealth() {
        let shouldRender = false;
        try {
          await api("/health");
          if (state.currentView === "server") {
            state.currentView = "build";
            shouldRender = true;
          }
          const entriesChanged = await refreshTasks();
          if (entriesChanged) {
            shouldRender = true;
          }
        } catch (_error) {
          if (state.currentView !== "server") {
            shouldRender = true;
          }
          state.currentView = "server";
          state.modal = null;
          stopSelectionPolling();
        }
        if (shouldRender) {
          render();
        }
      }

      function startHealthPolling() {
        if (state.healthTimer) {
          clearInterval(state.healthTimer);
        }
        checkHealth();
        state.healthTimer = setInterval(checkHealth, HEALTH_INTERVAL);
      }

      function openModal() {
        state.modal = {
          step: "select",
          selected: null,
          name: "",
          comment: "",
          thumbnail: null,
        };
        startSelectionPolling();
        render();
      }

      function closeModal() {
        state.modal = null;
        stopSelectionPolling();
        render();
      }

      async function queueModalEntry() {
        if (!state.modal || !state.modal.selected) {
          return;
        }

        const nameInput = document.getElementById("modal-name");
        const commentInput = document.getElementById("modal-comment");
        const figmaNodeName = (
          nameInput
            ? nameInput.value
            : state.modal.name || state.modal.selected.nodeName
        ).trim();
        const comment = (
          commentInput ? commentInput.value : state.modal.comment || ""
        ).trim();

        await api("/tasks", {
          method: "POST",
          body: JSON.stringify({
            figmaNodeId: state.modal.selected.nodeId,
            figmaNodeName: figmaNodeName || state.modal.selected.nodeName,
            comment: comment || undefined,
            status: "to-build",
          }),
        });

        postToSandbox({ type: "NOTIFY", message: "Added to queue" });
        closeModal();
        await refreshTasks();
        render();
      }

      function bindEvents() {
        document.querySelectorAll("[data-action]").forEach((element) => {
          element.addEventListener("click", async (event) => {
            const action = event.currentTarget.getAttribute("data-action");
            const entryId = event.currentTarget.getAttribute("data-entry-id");

            try {
              if (action === "switch-build") {
                state.currentView = "build";
                render();
                return;
              }

              if (action === "switch-review") {
                state.currentView = "review";
                render();
                return;
              }

              if (action === "open-modal") {
                openModal();
                return;
              }

              if (action === "modal-cancel") {
                closeModal();
                return;
              }

              if (
                action === "modal-continue" &&
                state.modal &&
                state.modal.selected
              ) {
                state.modal.step = "metadata";
                state.modal.name = state.modal.selected.nodeName;
                postToSandbox({
                  type: "EXPORT_THUMBNAIL",
                  nodeId: state.modal.selected.nodeId,
                });
                render();
                return;
              }

              if (
                action === "modal-copy-cancel" &&
                state.modal &&
                state.modal.selected
              ) {
                const nameInput = document.getElementById("modal-name");
                const commentInput = document.getElementById("modal-comment");
                const name = (
                  nameInput
                    ? nameInput.value
                    : state.modal.name || state.modal.selected.nodeName
                ).trim();
                const comment = (
                  commentInput ? commentInput.value : state.modal.comment || ""
                ).trim();
                await navigator.clipboard.writeText(
                  formatEntryJson(
                    state.modal.selected.nodeId,
                    name || state.modal.selected.nodeName,
                    comment,
                  ),
                );
                closeModal();
                return;
              }

              if (action === "modal-queue") {
                await queueModalEntry();
                return;
              }

              if (action === "delete-entry" && entryId) {
                await api(`/tasks/${entryId}`, { method: "DELETE" });
                await refreshTasks();
                render();
                return;
              }

              if (action === "copy-entry" && entryId) {
                const entry = state.entries.find(
                  (item) => item.entryId === entryId,
                );
                if (entry) {
                  await navigator.clipboard.writeText(formatEntry(entry));
                }
                return;
              }

              if (action === "copy-set") {
                const text = state.entries.map(formatEntry).join("\n\n");
                await navigator.clipboard.writeText(text);
                return;
              }

              if (action === "clear-all") {
                await api("/tasks", { method: "DELETE" });
                await refreshTasks();
                render();
              }
            } catch (_error) {
              postToSandbox({
                type: "NOTIFY",
                message: "Action failed. Check server connection.",
              });
            }
          });
        });

        const nameInput = document.getElementById("modal-name");
        if (nameInput) {
          nameInput.addEventListener("input", (event) => {
            if (!state.modal) return;
            state.modal.name = event.target.value;
          });
        }

        const commentInput = document.getElementById("modal-comment");
        if (commentInput) {
          commentInput.addEventListener("input", (event) => {
            if (!state.modal) return;
            state.modal.comment = event.target.value;
          });
        }
      }

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (
          msg.type === "SELECTION_DATA" &&
          state.modal &&
          state.modal.step === "select"
        ) {
          const previousSelected = state.modal.selected;
          state.modal.selected = msg.hasSelection
            ? {
                nodeId: msg.nodeId,
                nodeName: msg.nodeName,
              }
            : null;

          const changed =
            (previousSelected && !state.modal.selected) ||
            (!previousSelected && state.modal.selected) ||
            (previousSelected &&
              state.modal.selected &&
              (previousSelected.nodeId !== state.modal.selected.nodeId ||
                previousSelected.nodeName !== state.modal.selected.nodeName));

          if (changed) {
            render();
          }
          return;
        }

        if (msg.type === "THUMBNAIL_DATA") {
          if (state.thumbnails[msg.nodeId] === msg.base64) {
            return;
          }

          state.thumbnails[msg.nodeId] = msg.base64;
          if (
            state.modal &&
            state.modal.selected &&
            state.modal.selected.nodeId === msg.nodeId
          ) {
            state.modal.thumbnail = msg.base64;
          }
          render();
          return;
        }

        if (msg.type === "THUMBNAIL_ERROR") {
          if (state.thumbnails[msg.nodeId] === null) {
            return;
          }
          state.thumbnails[msg.nodeId] = null;
          render();
        }
      };

      render();
      startHealthPolling();
    </script>
  </body>
</html>
